<script>
  function updateClock() {
    var now = new Date();
    var yyyy = now.getFullYear();
    var mm = String(now.getMonth() + 1).padStart(2, '0');
    var dd = String(now.getDate()).padStart(2, '0');
    var hh = String(now.getHours()).padStart(2, '0');
    var mi = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('nowTime').textContent = yyyy + '-' + mm + '-' + dd + ' ' + hh + ':' + mi;
  }

  function stripHtml(str) {
    var div = document.createElement('div');
    div.innerHTML = str;
    return div.textContent || div.innerText || '';
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function loadRSS() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://kms89-tiumbio.github.io/magicinfo-yna-rss/rss.xml?_=' + new Date().getTime(), true);

    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        var parser = new DOMParser();
        var xml = parser.parseFromString(xhr.responseText, 'text/xml');
        var items = xml.getElementsByTagName('item');
        var list = document.getElementById('newsList');
        list.innerHTML = '';

        for (var i = 0; i < items.length && i < 8; i++) {
          var item = items[i];
          var titleNode = item.getElementsByTagName('title')[0];
          var descNode = item.getElementsByTagName('description')[0];

          var title = titleNode ? titleNode.textContent.trim() : '';
          var desc = descNode ? descNode.textContent.trim() : '';

          var li = document.createElement('li');
          li.className = 'news-item';
          li.innerHTML =
            '<div class="badge">NEWS</div>' +
            '<div class="content">' +
            '<div class="headline">' + escapeHtml(title) + '</div>' +
            '<div class="desc">' + escapeHtml(stripHtml(desc)) + '</div>' +
            '</div>';

          list.appendChild(li);
        }
      }
    };

    xhr.send();
  }

  updateClock();
  loadRSS();
  setInterval(updateClock, 1000);
  setInterval(loadRSS, 300000);
</script>
