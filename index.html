<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연합뉴스 뉴스보드</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #ffffff;
      overflow: hidden;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .title {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .time {
      font-size: 22px;
      color: #cbd5e1;
    }

    .board {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .news-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .news-item {
      display: flex;
      gap: 18px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .badge {
      flex: 0 0 88px;
      height: 34px;
      border-radius: 999px;
      background: #dc2626;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
    }

    .content {
      flex: 1;
      min-width: 0;
    }

    .headline {
      font-size: 30px;
      line-height: 1.35;
      font-weight: 700;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .desc {
      font-size: 20px;
      line-height: 1.5;
      color: #cbd5e1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .footer {
      margin-top: 18px;
      font-size: 18px;
      color: #94a3b8;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">연합뉴스 주요 뉴스</div>
      <div class="time" id="nowTime"></div>
    </div>

    <div class="board">
      <ul class="news-list" id="newsList"></ul>
    </div>

    <div class="footer">Data source: 연합뉴스 RSS</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const mi = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('nowTime').textContent = `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    async function loadRSS() {
      const res = await fetch('./rss.xml?_=' + Date.now());
      const text = await res.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const items = [...xml.querySelectorAll('item')].slice(0, 8);

      const list = document.getElementById('newsList');
      list.innerHTML = '';

      items.forEach(item => {
        const title = item.querySelector('title')?.textContent?.trim() || '';
        const desc = item.querySelector('description')?.textContent?.trim() || '';
        const li = document.createElement('li');
        li.className = 'news-item';
        li.innerHTML = `
          <div class="badge">NEWS</div>
          <div class="content">
            <div class="headline">${escapeHtml(title)}</div>
            <div class="desc">${escapeHtml(stripHtml(desc))}</div>
          </div>
        `;
        list.appendChild(li);
      });
    }

    function stripHtml(str) {
      const div = document.createElement('div');
      div.innerHTML = str;
      return div.textContent || div.innerText || '';
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    updateClock();
    loadRSS();

    setInterval(updateClock, 1000);
    setInterval(loadRSS, 300000);
  </script>
</body>
</html>
